<style>

/* SUPP CHECKLIST */

<div id="app">
  <div class="loading">
    <div class="loading-spinner"></div>

<script>
// ── SUPABASE CONFIG ────────────────────────────────────────────────────────
const SUPABASE_URL = 'https://cqbeatunyrpgdubeehcp.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNxYmVhdHVueXJwZ2R1YmVlaGNwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDQ5MjI5NTgsImV4cCI6MjA2MDQ5ODk1OH0.RJ3DkNEDCOaTpgOkmFHkKT1RtVYGKhezIaOAilBBl0s';
const TABLE = 'aaliyah_entries';

// ── STATE ──────────────────────────────────────────────────────────────────
let allEntries = [];
let activeFilter = 'all';
let activeTab = 'progress'; // 'progress' | 'log' | 'dailyform'
let formData = {};
let submitting = false;

// ── SUPABASE HELPERS ───────────────────────────────────────────────────────
async function sbFetch(path, options = {}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation',
      ...options.headers
    },
    ...options
  });
  if (!res.ok) throw new Error(`Supabase error: ${res.status}`);
  return res.json();
}

async function loadEntries() {
  return sbFetch(`${TABLE}?order=logged_at.asc&select=*`);
}

async function saveEntry(data) {
  return sbFetch(TABLE, {
    method: 'POST',
    body: JSON.stringify(data)
  });
}

// ── HELPERS ────────────────────────────────────────────────────────────────
function avg(arr) {
  const nums = arr.filter(v => v !== null && v !== undefined && v !== '' && !isNaN(+v)).map(Number);
  if (!nums.length) return null;
  return Math.round((nums.reduce((a,b) => a+b,0) / nums.length) * 10) / 10;
}

function trendArrow(current, previous, lowerIsBetter = false) {
  if (previous == null || current == null) return { symbol: '—', cls: 'trend-same', text: 'No prev data' };
  const diff = current - previous;
  if (Math.abs(diff) < 0.3) return { symbol: '→', cls: 'trend-same', text: 'Stable' };
  const improving = lowerIsBetter ? diff < 0 : diff > 0;
  return {
    symbol: diff > 0 ? '↑' : '↓',
    cls: improving ? 'trend-good' : 'trend-bad',
    text: `${diff > 0 ? '+' : ''}${diff.toFixed(1)} from prev`
  };
}

function filterEntries(entries, filter) {
  if (filter === 'all') return entries;
  const now = new Date();
  const startOfWeek = (offset = 0) => {
    const d = new Date(now);
    d.setDate(d.getDate() - d.getDay() - offset * 7);
    d.setHours(0,0,0,0);
    return d;
  };
  return entries.filter(e => {
    const d = new Date(e.logged_at);
    if (isNaN(d)) return false;
    if (filter === 'this') return d >= startOfWeek(0);
    if (filter === 'last') return d >= startOfWeek(1) && d < startOfWeek(0);
    if (filter === '30') { const c = new Date(now); c.setDate(now.getDate()-30); return d >= c; }
    return true;
  });
}

function groupByWeek(entries) {
  const groups = {};
  entries.forEach(e => {
    const d = new Date(e.logged_at);
    if (isNaN(d)) return;
    const monday = new Date(d);
    monday.setDate(d.getDate() - ((d.getDay() + 6) % 7));
    const key = monday.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    if (!groups[key]) groups[key] = [];
    groups[key].push(e);
  });
  return Object.entries(groups).sort((a,b) => new Date(b[0]) - new Date(a[0]));
}

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function val(v, fallback = '—') {
  return (v !== null && v !== undefined && v !== '') ? v : fallback;
}

// ── CHART ──────────────────────────────────────────────────────────────────
function drawChart(canvasId, labels, datasets, yMax = 10) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.offsetWidth;
  const H = canvas.offsetHeight || 200;
  canvas.width = W * dpr; canvas.height = H * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const pad = { top: 14, right: 18, bottom: 32, left: 32 };
  const cW = W - pad.left - pad.right;
  const cH = H - pad.top - pad.bottom;
  const n = labels.length;
  if (n < 1) return;
  ctx.fillStyle = '#fdf4f4'; ctx.fillRect(0,0,W,H);
  [2,4,6,8,10].filter(v => v <= yMax).forEach(v => {
    const y = pad.top + cH - (v/yMax)*cH;
    ctx.strokeStyle = '#e8ddd9'; ctx.lineWidth = 0.5; ctx.setLineDash([4,4]);
    ctx.beginPath(); ctx.moveTo(pad.left,y); ctx.lineTo(W-pad.right,y); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#bbb'; ctx.font = `9px DM Sans`; ctx.textAlign = 'right';
    ctx.fillText(v, pad.left-4, y+3);
  });
  datasets.forEach(({data, color}) => {
    const pts = data.map((v,i) => ({
      x: pad.left + (n>1 ? (i/(n-1))*cW : cW/2),
      y: pad.top + cH - ((+v)/yMax)*cH, v
    })).filter(p => p.v !== null && p.v !== '' && !isNaN(+p.v));
    if (!pts.length) return;
    ctx.beginPath(); ctx.moveTo(pts[0].x, pad.top+cH);
    pts.forEach(p => ctx.lineTo(p.x,p.y));
    ctx.lineTo(pts[pts.length-1].x, pad.top+cH);
    ctx.closePath(); ctx.fillStyle = color+'18'; ctx.fill();
    ctx.beginPath(); ctx.strokeStyle = color; ctx.lineWidth = 2.5;
    ctx.lineJoin = 'round'; ctx.lineCap = 'round';
    pts.forEach((p,i) => i===0 ? ctx.moveTo(p.x,p.y) : ctx.lineTo(p.x,p.y));
    ctx.stroke();
    pts.forEach(p => {
      ctx.beginPath(); ctx.arc(p.x,p.y,4,0,Math.PI*2); ctx.fillStyle=color; ctx.fill();
      ctx.beginPath(); ctx.arc(p.x,p.y,2,0,Math.PI*2); ctx.fillStyle='#fff'; ctx.fill();
    });
  });
  ctx.fillStyle='#8a7f7b'; ctx.font='9px DM Sans'; ctx.textAlign='center';
  labels.forEach((l,i) => {
    const x = pad.left + (n>1 ? (i/(n-1))*cW : cW/2);
    ctx.fillText(l, x, H-6);
  });
}

// ── SUPPLEMENT COMPLIANCE ──────────────────────────────────────────────────
const SUPP_LIST = [
  'Iron (morning)', 'Iron (lunch)', 'Vitamin C', 'L-Glutamine',
  'Zinc Carnosine', 'Probiotic', 'Akkermansia', 'DAO Enzyme',
  'Vitamin D', 'Selenium', 'Omega-3', 'B12', 'Magnesium', 'Multivitamin'
];

function suppCompliance(entries) {
  const counts = {};
  SUPP_LIST.forEach(s => counts[s] = 0);
  entries.forEach(e => {
    const taken = (e.supplements || '').toLowerCase();
    SUPP_LIST.forEach(s => {
      if (taken.includes(s.toLowerCase().split(' ')[0])) counts[s]++;
    });
  });
  return SUPP_LIST.map(s => ({ name: s, pct: entries.length ? Math.round((counts[s]/entries.length)*100) : 0 }));
}

// ── RENDER ─────────────────────────────────────────────────────────────────
function renderApp() {
  const filtered = filterEntries(allEntries, activeFilter);
  const latest = filtered[filtered.length - 1] || {};
  const prev = filtered.length > 1 ? filtered[filtered.length - 2] : null;

  const skinData = filtered.map(e => e.skin_severity);
  const sleepQData = filtered.map(e => e.sleep_quality);
  const sleepHData = filtered.map(e => e.sleep_hours);
  const energyData = filtered.map(e => e.energy_level);
  const moodData = filtered.map(e => e.mood);
  const anxietyData = filtered.map(e => e.anxiety);
  const painData = filtered.map(e => e.period_pain);

  const labels = filtered.map(e => {
    const d = new Date(e.logged_at);
    return isNaN(d) ? '' : `${d.getMonth()+1}/${d.getDate()}`;
  });

  const latestSkin = latest.skin_severity ?? null;
  const latestSleepQ = latest.sleep_quality ?? null;
  const latestSleepH = latest.sleep_hours ?? null;
  const latestWaking = latest.night_waking ?? null;
  const latestEnergy = latest.energy_level ?? null;
  const latestMood = latest.mood ?? null;

          </div>

          <!-- SUPPLEMENTS -->
          <div class="form-section">
            <div class="form-section-title">Supplements</div>
            <div class="supp-checklist">
              ${SUPP_LIST.map(s => `
                <div class="supp-check-item" onclick="toggleSupp('${s}',this)">
                  <input type="checkbox" id="supp-${s.replace(/\s/g,'-')}">
                  <div class="supp-check-label">${s}</div>
                </div>`).join('')}
            </div>
            <div style="margin-top:12px;">
              <div class="form-label" style="margin-bottom:6px;">Supplement notes</div>
              <input class="form-input" placeholder="Any reactions or observations..." oninput="setField('supplement_notes',this.value)" style="width:100%;">
            </div>
          </div>

          <!-- WINS & NOTES -->
          <div class="form-section">
            <div class="form-section-title">Wins &amp; Notes</div>
            <div class="form-row single">
              <div class="form-field">
                <div class="form-label">Weekly win — what went well?</div>
                <textarea class="form-textarea" placeholder="Share a win, big or small..." oninput="setField('weekly_win',this.value)"></textarea>
              </div>
            </div>
            <div class="form-row single">
              <div class="form-field">
                <div class="form-label">General notes</div>
                <textarea class="form-textarea" placeholder="Anything else you want to track..." oninput="setField('general_notes',this.value)"></textarea>
              </div>
            </div>
          </div>

          <button class="submit-btn" onclick="submitEntry()" id="submitBtn">Save Today's Entry</button>
          <div class="success-msg" id="successMsg">Entry saved! Keep up the great work.</div>
        </div>

      `}

    </div>

    <div class="footer">
      <strong>Heal Her Hormones</strong> · Precision Hormone Health for Women<br>
      Kairosana LLC · Ruth Anne Crowle, RD
    </div>
  `;

  // Build scale buttons
  if (activeTab === 'dailyform') {
    [
      ['skin_severity', 10], ['skin_itch', 10], ['sleep_quality', 10],
      ['energy_level', 10], ['period_pain', 10], ['mood', 10], ['anxiety', 10], ['bristol', 7]
    ].forEach(([field, max]) => {
      const container = document.getElementById(`scale-${field}`);
      if (!container) return;
      for (let i = 1; i <= max; i++) {
        const btn = document.createElement('button');
        btn.className = 'scale-btn';
        btn.textContent = i;
        btn.onclick = () => {
          container.querySelectorAll('.scale-btn').forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');
          setField(field, i);
        };
        container.appendChild(btn);
      }
    });
  }

  // Draw charts
  if (activeTab === 'progress') {
    requestAnimationFrame(() => {
      drawChart('mainChart', labels, [
        {data: skinData, color:'#C9747A'},
        {data: sleepQData, color:'#c9a77a'},
        {data: energyData, color:'#7ab8c9'},
        {data: moodData, color:'#7ac9a7'},
        {data: anxietyData, color:'#9d7ac9'},
      ]);
      drawChart('skinChart', labels, [
        {data: skinData, color:'#C9747A'},
        {data: anxietyData, color:'#9d7ac9'},
      ]);
      drawChart('sleepChart', labels, [
        {data: sleepQData, color:'#c9a77a'},
        {data: energyData, color:'#7ab8c9'},
      ]);
    });
  }
}

// ── FORM HELPERS ───────────────────────────────────────────────────────────
let selectedSupps = new Set();

function setField(field, value) {
  formData[field] = value;
}

function selectHeaviness(value, btn) {
  document.querySelectorAll('.heaviness-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  setField('flow_heaviness', value);
}

function selectClots(value, btn) {
  document.querySelectorAll('.clots-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  setField('clots', value);
}

function toggleSupp(name, item) {
  const cb = item.querySelector('input');
  cb.checked = !cb.checked;
  item.classList.toggle('checked', cb.checked);
  if (cb.checked) selectedSupps.add(name);
  else selectedSupps.delete(name);
  formData.supplements = [...selectedSupps].join(', ');
}

async function submitEntry() {
  if (submitting) return;
  submitting = true;
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'Saving…';
  try {
    const entry = {
      logged_at: new Date().toISOString(),
      ...formData
    };
    await saveEntry(entry);
    document.getElementById('successMsg').style.display = 'block';
    btn.textContent = 'Saved!';
    formData = {};
    selectedSupps.clear();
    // Reload data
    allEntries = await loadEntries();
    setTimeout(() => { activeTab = 'progress'; renderApp(); }, 1500);
  } catch(err) {
    btn.disabled = false;
    btn.textContent = 'Save Today\'s Entry';
    alert('Error saving: ' + err.message);
  } finally {
    submitting = false;
  }
}

function switchTab(tab) {
  activeTab = tab;
  renderApp();
}

function setFilter(filter) {
  activeFilter = filter;
  renderApp();
}

// ── INIT ───────────────────────────────────────────────────────────────────
loadEntries().then(entries => {
  allEntries = entries;
  renderApp();
}).catch(err => {
  document.getElementById('app').innerHTML = `
    <div style="padding:40px;">
      <div class="error-box">
        <h3>Could not load data</h3>
        <p>${err.message}</p>
      </div>
    </div>`;
});
</script>
</body>
</html>
