<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heal Her Hormones | Aaliyah's Progress Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --rose: #C9747A;
  --rose-dark: #a85a60;
  --rose-light: #f5e8e9;
  --rose-pale: #fdf4f4;
  --cream: #FBF8F5;
  --warm: #8a7f7b;
  --text: #2d2523;
  --text-light: #6b5f5b;
  --border: #e8ddd9;
  --white: #ffffff;
  --blue: #7ab8c9;
  --green: #7ac9a7;
  --gold: #c9a77a;
  --purple: #9d7ac9;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; }

/* HEADER */
.header {
  background: var(--white); border-bottom: 1px solid var(--border);
  padding: 32px 40px; display: flex; align-items: flex-end; justify-content: space-between;
  box-shadow: 0 2px 20px rgba(201,116,122,0.08);
}
.brand-tag { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--rose); font-weight: 500; margin-bottom: 6px; }
.header-title { font-family: 'Cormorant Garamond', serif; font-size: 36px; font-weight: 400; color: var(--text); line-height: 1.1; }
.header-title span { color: var(--rose); font-style: italic; }
.header-sub { font-size: 13px; color: var(--warm); margin-top: 6px; }
.header-right { text-align: right; }
.week-count { font-family: 'Cormorant Garamond', serif; font-size: 42px; color: var(--rose); line-height: 1; }
.week-label { font-size: 11px; color: var(--warm); letter-spacing: 0.06em; text-transform: uppercase; }
.last-updated { font-size: 12px; color: var(--warm); }

/* LOADING */
.loading { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; gap: 16px; }
.loading-spinner { width: 40px; height: 40px; border-radius: 50%; border: 3px solid var(--rose-light); border-top-color: var(--rose); animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 14px; color: var(--warm); }

/* ERROR */
.error-box { background: #fff5f5; border: 1px solid #fcc; border-radius: 12px; padding: 24px; margin: 40px; text-align: center; }
.error-box h3 { color: var(--rose-dark); margin-bottom: 8px; }
.error-box p { font-size: 13px; color: var(--warm); line-height: 1.6; }

/* MAIN */
.main { padding: 32px 40px; max-width: 1200px; margin: 0 auto; }

/* WEEK TOGGLE */
.week-toggle {
  display: flex; gap: 8px; margin-bottom: 28px; flex-wrap: wrap;
}
.toggle-btn {
  padding: 8px 18px; border-radius: 100px; border: 1.5px solid var(--border);
  background: var(--white); color: var(--warm); font-size: 13px; font-family: 'DM Sans', sans-serif;
  cursor: pointer; transition: all 0.2s;
}
.toggle-btn:hover { border-color: var(--rose); color: var(--rose); }
.toggle-btn.active { background: var(--rose); border-color: var(--rose); color: var(--white); font-weight: 500; }

/* SCORE CARDS */
.score-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 32px; }
.score-card { background: var(--white); border-radius: 16px; padding: 20px; box-shadow: 0 2px 16px rgba(201,116,122,0.08); position: relative; overflow: hidden; animation: fadeUp 0.5s ease both; }
.score-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
.score-card.skin::before { background: var(--rose); }
.score-card.sleep::before { background: var(--gold); }
.score-card.energy::before { background: var(--blue); }
.score-card.mood::before { background: var(--green); }
.score-card.anxiety::before { background: var(--purple); }
.score-card.cycle::before { background: var(--rose-dark); }
.score-label { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--warm); margin-bottom: 8px; }
.score-value { font-family: 'Cormorant Garamond', serif; font-size: 48px; line-height: 1; font-weight: 400; }
.score-card.skin .score-value { color: var(--rose); }
.score-card.sleep .score-value { color: var(--gold); }
.score-card.energy .score-value { color: var(--blue); }
.score-card.mood .score-value { color: var(--green); }
.score-card.anxiety .score-value { color: var(--purple); }
.score-card.cycle .score-value { color: var(--rose-dark); }
.score-sub { font-size: 11px; color: var(--warm); margin-top: 4px; }
.score-trend { font-size: 12px; margin-top: 8px; font-weight: 500; display: flex; align-items: center; gap: 4px; }
.trend-up { color: #e07070; }
.trend-down { color: #70b88a; }
.trend-same { color: var(--warm); }
.score-card.skin .trend-down, .score-card.anxiety .trend-down, .score-card.cycle .trend-down { color: #70b88a; }
.score-card.skin .trend-up, .score-card.anxiety .trend-up, .score-card.cycle .trend-up { color: #e07070; }
.score-card.sleep .trend-up, .score-card.energy .trend-up, .score-card.mood .trend-up { color: #70b88a; }
.score-card.sleep .trend-down, .score-card.energy .trend-down, .score-card.mood .trend-down { color: #e07070; }
@keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:none; } }

/* CHART */
.chart-section { background: var(--white); border-radius: 16px; padding: 28px; margin-bottom: 24px; box-shadow: 0 2px 16px rgba(201,116,122,0.08); animation: fadeUp 0.5s ease 0.1s both; }
.chart-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
.chart-title { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 400; }
.chart-legend { display: flex; gap: 16px; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--warm); }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; }
canvas { width: 100% !important; display: block; }

/* TWO COL */
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 24px; }
@media (max-width: 700px) { .two-col { grid-template-columns: 1fr; } }

/* CYCLE SECTION */
.cycle-section { background: var(--white); border-radius: 16px; padding: 28px; margin-bottom: 24px; box-shadow: 0 2px 16px rgba(201,116,122,0.08); }
.cycle-title { font-family: 'Cormorant Garamond', serif; font-size: 20px; margin-bottom: 16px; }
.cycle-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
.cycle-card { background: var(--rose-pale); border-radius: 12px; padding: 16px; text-align: center; border: 1px solid var(--rose-light); }
.cycle-card-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--warm); margin-bottom: 6px; }
.cycle-card-value { font-family: 'Cormorant Garamond', serif; font-size: 28px; color: var(--rose-dark); }
.cycle-card-sub { font-size: 10px; color: var(--warm); margin-top: 2px; }

/* SUPPLEMENT TABLE */
.supp-section { background: var(--white); border-radius: 16px; padding: 28px; margin-bottom: 24px; box-shadow: 0 2px 16px rgba(201,116,122,0.08); animation: fadeUp 0.5s ease 0.2s both; }
.supp-title { font-family: 'Cormorant Garamond', serif; font-size: 20px; margin-bottom: 20px; }
.supp-bars { display: flex; flex-direction: column; gap: 10px; }
.supp-row { display: flex; align-items: center; gap: 12px; }
.supp-name-label { font-size: 12px; color: var(--text); width: 160px; flex-shrink: 0; }
.supp-bar-track { flex: 1; height: 8px; background: var(--rose-light); border-radius: 4px; overflow: hidden; }
.supp-bar-fill { height: 100%; background: var(--rose); border-radius: 4px; transition: width 1s ease; }
.supp-pct { font-size: 12px; color: var(--warm); width: 36px; text-align: right; }

/* NOTES — ALL TIME BY WEEK */
.notes-section { background: var(--white); border-radius: 16px; padding: 28px; margin-bottom: 24px; box-shadow: 0 2px 16px rgba(201,116,122,0.08); animation: fadeUp 0.5s ease 0.3s both; }
.notes-title { font-family: 'Cormorant Garamond', serif; font-size: 20px; margin-bottom: 16px; }
.week-group { margin-bottom: 20px; }
.week-group-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--rose); font-weight: 500; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--rose-light); }
.notes-list { display: flex; flex-direction: column; gap: 10px; }
.note-item { padding: 14px 16px; background: var(--cream); border-radius: 10px; border-left: 3px solid var(--rose); }
.note-date { font-size: 11px; color: var(--warm); margin-bottom: 4px; }
.note-text { font-size: 13px; color: var(--text); line-height: 1.5; font-style: italic; margin-bottom: 2px; }
.note-category { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--rose); font-weight: 500; margin-bottom: 2px; }
.no-notes { font-size: 13px; color: var(--warm); font-style: italic; }

/* FOOTER */
.footer { text-align: center; padding: 32px; font-size: 12px; color: var(--warm); border-top: 1px solid var(--border); }
.footer strong { color: var(--rose); }

/* PRINT */
@media print {
  .header { padding: 20px; }
  .main { padding: 20px; }
  .score-card, .chart-section, .supp-section, .notes-section { box-shadow: none; border: 1px solid var(--border); }
}

@media (max-width: 600px) {
  .header { flex-direction: column; align-items: flex-start; gap: 16px; padding: 24px 20px; }
  .main { padding: 20px; }
  .score-grid { grid-template-columns: repeat(2, 1fr); }
  .header-title { font-size: 26px; }
}
</style>
</head>
<body>

<div id="app">
  <div class="loading" id="loadingState">
    <div class="loading-spinner"></div>
    <div class="loading-text">Loading Aaliyah's data…</div>
  </div>
</div>

<script>
const SHEET_ID = '1dbfTN8qCQcXLZSa7zsApTTpMRklC6gdW9gS_BMkisTI';
const CLIENT = 'Aaliyah';

const COL = {
  date: 0, client: 1,
  skinSeverity: 2, skinItch: 3, skinAreas: 4, skinNotes: 5,
  sleepHours: 6, sleepQuality: 7, nightWaking: 8, sleepNotes: 9,
  energyLevel: 10, energyCrash: 11, energyNotes: 12,
  bmFreq: 13, bristol: 14, digestSymptoms: 15, digestNotes: 16,
  cyclePhase: 17, periodSymptoms: 18, periodPain: 19,
  cycleClots: 20,      // NEW — clots (yes/no or 1-10)
  cycleHeaviness: 21,  // NEW — heaviness (1-10)
  cycleNotes: 22,      // shifted
  mood: 23, anxiety: 24, moodNotes: 25,
  mealsPerDay: 26, breakfastTiming: 27, newFoods: 28, newFoodNotes: 29, foodNotes: 30,
  supplements: 31, suppNotes: 32
};

// ── State ──────────────────────────────────────────────────────────────────
let allRows = [];
let activeFilter = 'all';

async function loadData() {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Weekly%20Submissions`;
  const res = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
  const rows = json.table.rows;
  if (!rows || rows.length === 0) return [];
  return rows.map(row => row.c.map(cell => cell ? (cell.f || cell.v || '') : ''));
}

function avg(arr) {
  const nums = arr.filter(v => v !== '' && !isNaN(+v)).map(Number);
  if (!nums.length) return null;
  return Math.round((nums.reduce((a,b) => a+b,0) / nums.length) * 10) / 10;
}

function trendArrow(current, previous, lowerIsBetter = false) {
  if (previous === null || current === null) return { symbol: '—', cls: 'trend-same', text: 'No previous data' };
  const diff = current - previous;
  if (Math.abs(diff) < 0.3) return { symbol: '→', cls: 'trend-same', text: 'Stable' };
  const improving = lowerIsBetter ? diff < 0 : diff > 0;
  return {
    symbol: diff > 0 ? '↑' : '↓',
    cls: improving ? 'trend-down' : 'trend-up',
    text: `${diff > 0 ? '+' : ''}${diff.toFixed(1)} from prev`
  };
}

// ── Filter rows by time window ─────────────────────────────────────────────
function filterRows(rows, filter) {
  if (filter === 'all') return rows;
  const now = new Date();
  const startOfWeek = (offset = 0) => {
    const d = new Date(now);
    d.setDate(d.getDate() - d.getDay() - offset * 7);
    d.setHours(0,0,0,0);
    return d;
  };
  const endOfWeek = (offset = 0) => {
    const d = startOfWeek(offset);
    d.setDate(d.getDate() + 7);
    return d;
  };

  return rows.filter(row => {
    const raw = row[COL.date];
    if (!raw) return false;
    const d = new Date(raw);
    if (isNaN(d.getTime())) return false;
    if (filter === 'this') return d >= startOfWeek(0) && d < endOfWeek(0);
    if (filter === 'last') return d >= startOfWeek(1) && d < startOfWeek(0);
    if (filter === '30') { const cutoff = new Date(now); cutoff.setDate(now.getDate()-30); return d >= cutoff; }
    return true;
  });
}

// ── Group rows into weeks for notes ───────────────────────────────────────
function groupByWeek(rows) {
  const groups = {};
  rows.forEach(row => {
    const raw = row[COL.date];
    if (!raw) return;
    const d = new Date(raw);
    if (isNaN(d.getTime())) return;
    // Get Monday of that week
    const monday = new Date(d);
    monday.setDate(d.getDate() - ((d.getDay() + 6) % 7));
    const key = monday.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    if (!groups[key]) groups[key] = [];
    groups[key].push(row);
  });
  // Sort weeks descending
  return Object.entries(groups).sort((a,b) => new Date(b[0]) - new Date(a[0]));
}

function drawLineChart(canvasId, labels, datasets, yMax = 10) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.offsetWidth;
  const H = canvas.offsetHeight || 220;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const pad = { top: 16, right: 20, bottom: 36, left: 36 };
  const cW = W - pad.left - pad.right;
  const cH = H - pad.top - pad.bottom;
  const n = labels.length;
  if (n < 1) return;

  ctx.fillStyle = '#fdf4f4';
  ctx.fillRect(0, 0, W, H);

  [2,4,6,8,10].filter(v => v <= yMax).forEach(v => {
    const y = pad.top + cH - (v / yMax) * cH;
    ctx.strokeStyle = '#e8ddd9'; ctx.lineWidth = 0.5;
    ctx.setLineDash([4,4]);
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#bbb';
    ctx.font = `${10 * (W/400 > 1 ? 1 : W/400)}px DM Sans`;
    ctx.textAlign = 'right';
    ctx.fillText(v, pad.left - 6, y + 3);
  });

  datasets.forEach(({ data, color }) => {
    const points = data.map((v, i) => ({
      x: pad.left + (n > 1 ? (i / (n-1)) * cW : cW/2),
      y: pad.top + cH - ((+v) / yMax) * cH,
      v
    })).filter(p => p.v !== '' && !isNaN(+p.v));

    if (points.length < 1) return;

    ctx.beginPath();
    ctx.moveTo(points[0].x, pad.top + cH);
    points.forEach(p => ctx.lineTo(p.x, p.y));
    ctx.lineTo(points[points.length-1].x, pad.top + cH);
    ctx.closePath();
    ctx.fillStyle = color + '18'; ctx.fill();

    ctx.beginPath();
    ctx.strokeStyle = color; ctx.lineWidth = 2.5;
    ctx.lineJoin = 'round'; ctx.lineCap = 'round';
    points.forEach((p,i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
    ctx.stroke();

    points.forEach(p => {
      ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI*2);
      ctx.fillStyle = color; ctx.fill();
      ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI*2);
      ctx.fillStyle = '#fff'; ctx.fill();
    });
  });

  ctx.fillStyle = '#8a7f7b';
  ctx.font = '10px DM Sans'; ctx.textAlign = 'center';
  labels.forEach((l,i) => {
    const x = pad.left + (n > 1 ? (i / (n-1)) * cW : cW/2);
    ctx.fillText(l, x, H - 8);
  });
}

function supplementCompliance(rows) {
  const suppList = [
    'Iron (morning)', 'Iron (lunch)', 'Vitamin C with iron', 'L-Glutamine',
    'Zinc Carnosine', 'Probiotic', 'Akkermansia', 'DAO Enzyme',
    'Vitamin D', 'Selenium', 'Omega-3', 'B12', 'Magnesium', 'Multivitamin'
  ];
  const counts = {};
  suppList.forEach(s => counts[s] = 0);
  rows.forEach(row => {
    const taken = (row[COL.supplements] || '').toLowerCase();
    suppList.forEach(s => {
      if (taken.includes(s.toLowerCase().split(' ')[0])) counts[s]++;
    });
  });
  return suppList.map(s => ({ name: s, pct: rows.length ? Math.round((counts[s] / rows.length) * 100) : 0 }));
}

function render(rows) {
  const filtered = filterRows(rows, activeFilter);
  if (!filtered.length) {
    document.querySelector('.main').innerHTML = `<div class="error-box"><h3>No entries for this period</h3><p>Try selecting a different time range above.</p></div>`;
    return;
  }

  const labels = filtered.map(r => {
    const d = r[COL.date];
    if (!d) return '';
    const parts = String(d).split('/');
    if (parts.length === 3) return `${parts[1]}/${parts[2].slice(-2)}`;
    return String(d).slice(5,10);
  });

  const skinData = filtered.map(r => r[COL.skinSeverity]);
  const sleepData = filtered.map(r => r[COL.sleepQuality]);
  const energyData = filtered.map(r => r[COL.energyLevel]);
  const moodData = filtered.map(r => r[COL.mood]);
  const anxietyData = filtered.map(r => r[COL.anxiety]);
  const painData = filtered.map(r => r[COL.periodPain]);
  const heavinessData = filtered.map(r => r[COL.cycleHeaviness]);

  const latest = filtered[filtered.length - 1];
  const prev = filtered.length > 1 ? filtered[filtered.length - 2] : null;

  const latestSkin = +latest[COL.skinSeverity] || null;
  const latestSleep = +latest[COL.sleepQuality] || null;
  const latestEnergy = +latest[COL.energyLevel] || null;
  const latestMood = +latest[COL.mood] || null;
  const latestAnxiety = +latest[COL.anxiety] || null;
  const latestPain = +latest[COL.periodPain] || null;
  const latestHeaviness = +latest[COL.cycleHeaviness] || null;
  const latestClots = latest[COL.cycleClots] || null;

  const prevSkin = prev ? (+prev[COL.skinSeverity] || null) : null;
  const prevSleep = prev ? (+prev[COL.sleepQuality] || null) : null;
  const prevEnergy = prev ? (+prev[COL.energyLevel] || null) : null;
  const prevMood = prev ? (+prev[COL.mood] || null) : null;
  const prevAnxiety = prev ? (+prev[COL.anxiety] || null) : null;
  const prevHeaviness = prev ? (+prev[COL.cycleHeaviness] || null) : null;

  const skinTrend = trendArrow(latestSkin, prevSkin, true);
  const sleepTrend = trendArrow(latestSleep, prevSleep, false);
  const energyTrend = trendArrow(latestEnergy, prevEnergy, false);
  const moodTrend = trendArrow(latestMood, prevMood, false);
  const anxietyTrend = trendArrow(latestAnxiety, prevAnxiety, true);
  const heavinessTrend = trendArrow(latestHeaviness, prevHeaviness, true);

  const supps = supplementCompliance(filtered);

  // All notes grouped by week
  const weekGroups = groupByWeek(filtered);
  const notesHTML = weekGroups.map(([weekLabel, weekRows]) => {
    const weekNotes = weekRows.flatMap(r => {
      const entries = [];
      if (r[COL.skinNotes]) entries.push({ cat: 'Skin', text: r[COL.skinNotes], date: r[COL.date] });
      if (r[COL.sleepNotes]) entries.push({ cat: 'Sleep', text: r[COL.sleepNotes], date: r[COL.date] });
      if (r[COL.energyNotes]) entries.push({ cat: 'Energy', text: r[COL.energyNotes], date: r[COL.date] });
      if (r[COL.moodNotes]) entries.push({ cat: 'Mood', text: r[COL.moodNotes], date: r[COL.date] });
      if (r[COL.cycleNotes]) entries.push({ cat: 'Cycle', text: r[COL.cycleNotes], date: r[COL.date] });
      if (r[COL.foodNotes]) entries.push({ cat: 'Food', text: r[COL.foodNotes], date: r[COL.date] });
      if (r[COL.digestNotes]) entries.push({ cat: 'Digestion', text: r[COL.digestNotes], date: r[COL.date] });
      return entries;
    });
    if (!weekNotes.length) return '';
    return `
      <div class="week-group">
        <div class="week-group-label">Week of ${weekLabel}</div>
        <div class="notes-list">
          ${weekNotes.map(n => `
            <div class="note-item">
              <div class="note-date">${n.date}</div>
              <div class="note-category">${n.cat}</div>
              <div class="note-text">"${n.text}"</div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }).join('');

  document.getElementById('app').innerHTML = `
    <header class="header">
      <div class="header-left">
        <div class="brand-tag">Heal Her Hormones · Kairosana LLC · Ruth Anne Crowle, RD</div>
        <h1 class="header-title"><span>${CLIENT}'s</span> Progress Dashboard</h1>
        <div class="header-sub">Daily check-in tracking · All time progress overview</div>
      </div>
      <div class="header-right">
        <div class="week-count">${rows.length}</div>
        <div class="week-label">Days tracked</div>
        <div class="last-updated" style="margin-top:6px;">Last check-in: ${latest[COL.date] || 'Unknown'}</div>
      </div>
    </header>

    <div class="main">

      <!-- WEEK TOGGLE -->
      <div class="week-toggle">
        <button class="toggle-btn ${activeFilter === 'this' ? 'active' : ''}" onclick="setFilter('this')">This Week</button>
        <button class="toggle-btn ${activeFilter === 'last' ? 'active' : ''}" onclick="setFilter('last')">Last Week</button>
        <button class="toggle-btn ${activeFilter === '30' ? 'active' : ''}" onclick="setFilter('30')">Last 30 Days</button>
        <button class="toggle-btn ${activeFilter === 'all' ? 'active' : ''}" onclick="setFilter('all')">All Time</button>
      </div>

      <!-- SCORE CARDS -->
      <div class="score-grid">
        <div class="score-card skin">
          <div class="score-label">Skin Severity</div>
          <div class="score-value">${latestSkin !== null ? latestSkin : '—'}</div>
          <div class="score-sub">Latest · avg ${avg(skinData) ?? '—'}/10</div>
          <div class="score-trend ${skinTrend.cls}">${skinTrend.symbol} ${skinTrend.text}</div>
        </div>
        <div class="score-card sleep">
          <div class="score-label">Sleep Quality</div>
          <div class="score-value">${latestSleep !== null ? latestSleep : '—'}</div>
          <div class="score-sub">Latest · avg ${avg(sleepData) ?? '—'}/10</div>
          <div class="score-trend ${sleepTrend.cls}">${sleepTrend.symbol} ${sleepTrend.text}</div>
        </div>
        <div class="score-card energy">
          <div class="score-label">Energy</div>
          <div class="score-value">${latestEnergy !== null ? latestEnergy : '—'}</div>
          <div class="score-sub">Latest · avg ${avg(energyData) ?? '—'}/10</div>
          <div class="score-trend ${energyTrend.cls}">${energyTrend.symbol} ${energyTrend.text}</div>
        </div>
        <div class="score-card mood">
          <div class="score-label">Mood</div>
          <div class="score-value">${latestMood !== null ? latestMood : '—'}</div>
          <div class="score-sub">Latest · avg ${avg(moodData) ?? '—'}/10</div>
          <div class="score-trend ${moodTrend.cls}">${moodTrend.symbol} ${moodTrend.text}</div>
        </div>
        <div class="score-card anxiety">
          <div class="score-label">Anxiety</div>
          <div class="score-value">${latestAnxiety !== null ? latestAnxiety : '—'}</div>
          <div class="score-sub">Latest · avg ${avg(anxietyData) ?? '—'}/10</div>
          <div class="score-trend ${anxietyTrend.cls}">${anxietyTrend.symbol} ${anxietyTrend.text}</div>
        </div>
        <div class="score-card cycle">
          <div class="score-label">Flow Heaviness</div>
          <div class="score-value">${latestHeaviness !== null ? latestHeaviness : '—'}</div>
          <div class="score-sub">Latest · avg ${avg(heavinessData) ?? '—'}/10</div>
          <div class="score-trend ${heavinessTrend.cls}">${heavinessTrend.symbol} ${heavinessTrend.text}</div>
        </div>
      </div>

      <!-- MAIN TREND CHART -->
      <div class="chart-section">
        <div class="chart-header">
          <div class="chart-title">All Key Scores Over Time</div>
          <div class="chart-legend">
            <div class="legend-item"><div class="legend-dot" style="background:var(--rose)"></div>Skin</div>
            <div class="legend-item"><div class="legend-dot" style="background:var(--gold)"></div>Sleep</div>
            <div class="legend-item"><div class="legend-dot" style="background:var(--blue)"></div>Energy</div>
            <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>Mood</div>
            <div class="legend-item"><div class="legend-dot" style="background:var(--purple)"></div>Anxiety</div>
          </div>
        </div>
        <canvas id="mainChart" style="height:240px;"></canvas>
      </div>

      <!-- TWO CHARTS -->
      <div class="two-col">
        <div class="chart-section" style="margin-bottom:0;">
          <div class="chart-header">
            <div class="chart-title">Skin &amp; Anxiety</div>
            <div class="chart-legend">
              <div class="legend-item"><div class="legend-dot" style="background:var(--rose)"></div>Severity</div>
              <div class="legend-item"><div class="legend-dot" style="background:var(--purple)"></div>Anxiety</div>
            </div>
          </div>
          <canvas id="skinChart" style="height:180px;"></canvas>
        </div>
        <div class="chart-section" style="margin-bottom:0;">
          <div class="chart-header">
            <div class="chart-title">Sleep &amp; Energy</div>
            <div class="chart-legend">
              <div class="legend-item"><div class="legend-dot" style="background:var(--gold)"></div>Sleep</div>
              <div class="legend-item"><div class="legend-dot" style="background:var(--blue)"></div>Energy</div>
            </div>
          </div>
          <canvas id="sleepChart" style="height:180px;"></canvas>
        </div>
      </div>

      <!-- CYCLE SECTION -->
      <div class="cycle-section">
        <div class="cycle-title">Cycle & Menstrual Health</div>
        <div class="cycle-grid">
          <div class="cycle-card">
            <div class="cycle-card-label">Current Phase</div>
            <div class="cycle-card-value" style="font-size:18px;">${latest[COL.cyclePhase] || '—'}</div>
          </div>
          <div class="cycle-card">
            <div class="cycle-card-label">Pain (latest)</div>
            <div class="cycle-card-value">${latestPain !== null ? latestPain : '—'}</div>
            <div class="cycle-card-sub">avg ${avg(painData) ?? '—'}/10</div>
          </div>
          <div class="cycle-card">
            <div class="cycle-card-label">Flow Heaviness</div>
            <div class="cycle-card-value">${latestHeaviness !== null ? latestHeaviness : '—'}</div>
            <div class="cycle-card-sub">avg ${avg(heavinessData) ?? '—'}/10</div>
          </div>
          <div class="cycle-card">
            <div class="cycle-card-label">Clots (latest)</div>
            <div class="cycle-card-value" style="font-size:20px;">${latestClots || '—'}</div>
          </div>
          <div class="cycle-card">
            <div class="cycle-card-label">Symptoms</div>
            <div class="cycle-card-value" style="font-size:14px; padding-top:4px;">${latest[COL.periodSymptoms] || 'None logged'}</div>
          </div>
        </div>
        ${latest[COL.cycleNotes] ? `<div style="margin-top:14px; padding:12px 16px; background:var(--rose-pale); border-radius:10px; border-left:3px solid var(--rose-dark); font-size:13px; font-style:italic; color:var(--text);">"${latest[COL.cycleNotes]}"</div>` : ''}
      </div>

      <!-- SUPPLEMENT COMPLIANCE -->
      <div class="supp-section">
        <div class="supp-title">Supplement Compliance</div>
        <div class="supp-bars">
          ${supps.map(s => `
            <div class="supp-row">
              <div class="supp-name-label">${s.name}</div>
              <div class="supp-bar-track"><div class="supp-bar-fill" style="width:${s.pct}%"></div></div>
              <div class="supp-pct">${s.pct}%</div>
            </div>
          `).join('')}
        </div>
      </div>

      <!-- ALL NOTES BY WEEK -->
      <div class="notes-section">
        <div class="notes-title">Notes from Aaliyah — All Time by Week</div>
        ${notesHTML || '<div class="no-notes">No notes logged yet.</div>'}
      </div>

    </div>

    <div class="footer">
      <strong>Heal Her Hormones</strong> · Precision Hormone Health for Women<br>
      Kairosana LLC · Ruth Anne Crowle, RD · Dashboard auto-updates when new data is submitted
    </div>
  `;

  requestAnimationFrame(() => {
    drawLineChart('mainChart', labels, [
      { data: skinData, color: '#C9747A' },
      { data: sleepData, color: '#c9a77a' },
      { data: energyData, color: '#7ab8c9' },
      { data: moodData, color: '#7ac9a7' },
      { data: anxietyData, color: '#9d7ac9' },
    ]);
    drawLineChart('skinChart', labels, [
      { data: skinData, color: '#C9747A' },
      { data: anxietyData, color: '#9d7ac9' },
    ]);
    drawLineChart('sleepChart', labels, [
      { data: sleepData, color: '#c9a77a' },
      { data: energyData, color: '#7ab8c9' },
    ]);
  });
}

function setFilter(filter) {
  activeFilter = filter;
  render(allRows);
}

// Init
loadData().then(rows => {
  if (!rows.length) {
    document.getElementById('app').innerHTML = `
      <header class="header">
        <div class="header-left">
          <div class="brand-tag">Heal Her Hormones · Kairosana LLC</div>
          <h1 class="header-title">Aaliyah's Dashboard</h1>
        </div>
      </header>
      <div class="main">
        <div class="error-box">
          <h3>No data yet</h3>
          <p>No submissions found. Once Aaliyah submits her first check-in, the dashboard will populate automatically.</p>
        </div>
      </div>`;
    return;
  }
  allRows = rows;
  render(allRows);
}).catch(err => {
  document.getElementById('app').innerHTML = `
    <div class="main" style="padding-top:40px;">
      <div class="error-box">
        <h3>Couldn't load data</h3>
        <p>${err.message}<br><br>Make sure your Google Sheet is shared as <strong>"Anyone with the link can view"</strong>.</p>
      </div>
    </div>`;
});
</script>
</body>
</html>
